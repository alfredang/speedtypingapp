name: SpeedTyping
options:
  bundleIdPrefix: com.tertiaryinfotech
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "GU9WTSTX9M"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "2"   # iPad only
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  SpeedTyping:
    type: application
    platform: iOS
    sources:
      - SpeedTyping
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tertiaryinfotech.speedtyping
        INFOPLIST_KEY_CFBundleDisplayName: SpeedTyping
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
